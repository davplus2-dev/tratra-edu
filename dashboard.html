<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - Tratra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="system.js"></script>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-indigo-900 text-white hidden md:flex flex-col">
        <div class="p-6">
            <a href="index.html" class="flex items-center gap-3">
                <img src="logo.jpg" alt="TratraEdu Logo" class="h-10 w-auto object-contain">
                <span class="text-2xl font-bold text-white hidden sm:block">TratraEdu</span>
            </a>
        </div>
        <nav class="flex-grow px-4 space-y-2 mt-4">
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-indigo-800 rounded-lg text-white font-medium">
                <span>🏠</span> Dashboard
            </a>
            <a href="courses.html" class="flex items-center gap-3 px-4 py-3 text-indigo-200 hover:bg-indigo-800 hover:text-white rounded-lg transition">
                <span>📚</span> Browse Courses
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-indigo-200 hover:bg-indigo-800 hover:text-white rounded-lg transition">
                <span>🏆</span> Certifications
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 text-indigo-200 hover:bg-indigo-800 hover:text-white rounded-lg transition">
                <span>💬</span> Community
            </a>
        </nav>
        <div class="p-6 border-t border-indigo-800">
            <div class="flex items-center gap-3">
                <div id="user-avatar" class="w-10 h-10 bg-indigo-500 rounded-full flex items-center justify-center font-bold">--</div>
                <div>
                    <p id="user-name" class="text-sm font-medium">Loading...</p>
                    <p id="user-role" class="text-xs text-indigo-300">Teacher</p>
                </div>
            </div>
            <button onclick="handleLogout()" class="mt-4 w-full text-center text-sm text-indigo-300 hover:text-white transition">Logout</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow overflow-y-auto">
        <header class="bg-white shadow-sm px-8 py-4 flex justify-between items-center">
            <h2 id="welcome-msg" class="text-xl font-bold text-slate-800">Welcome back! 👋</h2>
            <div class="flex items-center gap-4">
                <button class="p-2 text-slate-400 hover:text-indigo-600 transition relative">
                    <span>🔔</span>
                </button>
                <img id="nav-avatar" src="https://ui-avatars.com/api/?name=User" alt="Avatar" class="w-8 h-8 rounded-full border">
            </div>
        </header>

        <div class="p-8">
            <!-- Stats Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-slate-500 text-sm mb-1">Courses Enrolled</p>
                    <h3 id="stat-enrolled" class="text-3xl font-bold">0</h3>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-slate-500 text-sm mb-1">Courses Completed</p>
                    <h3 id="stat-completed" class="text-3xl font-bold">0</h3>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-slate-500 text-sm mb-1">Current Level</p>
                    <h3 id="stat-level" class="text-3xl font-bold">Novice</h3>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Left Column: Learning Progress -->
                <div class="lg:col-span-2">
                    <h3 class="text-2xl font-bold text-slate-800 mb-6">Your Training Progress</h3>
                    <div id="courses-grid" class="grid grid-cols-1 gap-6">
                        <!-- Dynamic Content -->
                    </div>
                </div>

                <!-- Right Column: My Scores -->
                <div class="lg:col-span-1">
                    <h3 class="text-2xl font-bold text-slate-800 mb-6">My Test Scores</h3>
                    <div id="scores-list" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                        <!-- Dynamic content -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function initDashboard() {
            const user = Tratra.auth.getCurrentUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('user-name').innerText = user.name;
            document.getElementById('welcome-msg').innerText = `Welcome back, ${user.name.split(' ')[0]}! 👋`;
            document.getElementById('user-avatar').innerText = user.name.charAt(0).toUpperCase();
            document.getElementById('nav-avatar').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=6366f1&color=fff`;

            const enrolled = user.enrolledCourses || [];
            document.getElementById('stat-enrolled').innerText = enrolled.length;
            document.getElementById('stat-completed').innerText = enrolled.filter(c => c.completed).length;
            
            // Render Courses
            const grid = document.getElementById('courses-grid');
            grid.innerHTML = '';

            if (enrolled.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-12 bg-white rounded-2xl border-2 border-dashed border-slate-200">
                        <p class="text-slate-500 mb-4">You haven't enrolled in any courses yet.</p>
                        <a href="courses.html" class="text-indigo-600 font-bold hover:underline">Explore the Catalog →</a>
                    </div>
                `;
            } else {
                enrolled.forEach(course => {
                    const card = document.createElement('div');
                    card.className = 'bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition group flex justify-between items-center';
                    
                    const courseTitle = Tratra.courses[course.courseId]?.title || `Course ${course.courseId}`;
                    const scoreData = user.scores?.[course.courseId];
                    const scoreHtml = scoreData ? `<span class="text-sm font-bold text-green-600">Score: ${scoreData.score}/100</span>` : `<span class="text-sm text-slate-400 italic">No quiz taken</span>`;

                    card.innerHTML = `
                        <div class="flex-grow">
                            <div class="flex items-center gap-3 mb-2">
                                <h4 class="text-lg font-bold text-slate-800">${courseTitle}</h4>
                                ${scoreHtml}
                            </div>
                            <div class="flex items-center gap-4">
                                <div class="flex-grow bg-slate-100 rounded-full h-2 max-w-xs">
                                    <div class="bg-indigo-600 h-2 rounded-full" style="width: ${course.progress}%"></div>
                                </div>
                                <span class="text-xs font-bold text-slate-500">${course.progress}%</span>
                            </div>
                        </div>
                        <div class="ml-6">
                            <a href="course.html?id=${course.courseId}" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-bold hover:bg-indigo-700 transition">Continue</a>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }

            // Render Scores
            const scoresList = document.getElementById('scores-list');
            scoresList.innerHTML = '';
            if (!user.scores || Object.keys(user.scores).length === 0) {
                scoresList.innerHTML = '<p class="text-slate-400 text-sm text-center py-4">No scores recorded yet.</p>';
            } else {
                for (const [id, data] of Object.entries(user.scores)) {
                    const title = Tratra.courses[id]?.title || 'Unknown Course';
                    const item = document.createElement('div');
                    item.className = 'flex justify-between items-center p-3 bg-slate-50 rounded-lg border border-slate-100';
                    item.innerHTML = `
                        <span class="text-sm font-medium text-slate-700">${title}</span>
                        <span class="text-sm font-bold ${data.score >= 60 ? 'text-green-600' : 'text-red-600'}">${data.score}/100</span>
                    `;
                    scoresList.appendChild(item);
                }
            }
        }

        function handleLogout() {
            Tratra.auth.logout();
            window.location.href = 'login.html';
        }

        window.onload = initDashboard;
    </script>

</html>
