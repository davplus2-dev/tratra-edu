<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center">
                    <a href="index.html" class="text-2xl font-bold text-indigo-600">Tratra</a>
                </div>
                <a href="index.html" class="text-slate-600 hover:text-indigo-600 transition">Back to Home</a>
            </div>
        </div>
    </nav>

    <!-- Floating WhatsApp Button -->
    <a href="https://wa.me/96877598158" target="_blank" class="fixed bottom-6 right-6 z-50 bg-[#25D366] text-white p-4 rounded-full shadow-2xl hover:scale-110 transition-transform flex items-center gap-2 group">
        <span class="max-w-0 overflow-hidden group-hover:max-w-xs transition-all duration-500 ease-in-out whitespace-nowrap font-medium">
            Enquiries? Chat with us!
        </span>
        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163C2.476-10.55 7.648-20 18.35 14.52l6.08 3.13-11.54 14.44h-5.64z"/></svg>
    </a>

    <!-- Registration Form -->
    <main class="flex-grow flex items-center justify-center py-12 px-4">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-slate-900 mb-2">Create Your Account</h2>
                <p class="text-slate-500">Start your professional journey today.</p>
            </div>

            <form id="registrationForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
                    <input type="text" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                    <input type="email" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="john@school.edu">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Teaching Subject</label>
                    <select class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                        <option>Mathematics</option>
                        <option>Science</option>
                        <option>English/Literature</option>
                        <option>History/Social Studies</option>
                        <option>Arts</option>
                        <option>Other</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="••••••••">
                </div>
                
                <div class="flex items-start">
                    <div class="flex items-center h-5">
                        <input id="terms" type="checkbox" required class="w-4 h-4 border border-slate-300 rounded bg-slate-50 focus:ring-3 focus:ring-indigo-300">
                    </div>
                    <div class="ml-3 text-sm">
                        <label for="terms" class="text-slate-500">I agree to the <a href="#" class="text-indigo-600 hover:underline">Terms and Conditions</a></label>
                    </div>
                </div>

                <button type="submit" class="w-full py-3 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 transition shadow-lg">
                    Create Account
                </button>
            </form>

            <p class="mt-6 text-center text-sm text-slate-500">
                Already have an account? <a href="dashboard.html" class="text-indigo-600 font-semibold hover:underline">Sign in</a>
            </p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-400 py-12 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center border-b border-slate-800 pb-8 mb-8">
                <div class="text-2xl font-bold text-white mb-4 md:mb-0">Tratra</div>

                    </a>

                    </a>

                    </a>

                    </a>
                </div>

                <div class="flex space-x-6">
                    <a href="#" class="hover:text-white transition">Privacy Policy</a>
                    <a href="#" class="hover:text-white transition">Terms of Service</a>
                    <a href="#" class="hover:text-white transition">Contact</a>
                </div>
            </div>
            <div class="text-center text-sm">
                &copy; 2026 Tratra Teacher Training. All rights reserved.
            </div>
        </div>
    </footer>

    <script src="system.js"></script>
    <script>
        document.getElementById('registrationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const userData = {
                name: this.querySelector('input[type="text"]').value,
                email: this.querySelector('input[type="email"]').value,
                subject: this.querySelector('select').value,
                password: this.querySelector('input[type="password"]').value,
            };
            
            try {
                await Tratra.auth.signup(userData);
                alert('Account created successfully!');
                window.location.href = 'payment.html';
            } catch (err) {
                alert(err.message);
            }
        });
    </script>
